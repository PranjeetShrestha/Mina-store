<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mina Store</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a11cb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mina Store">
</head>
<body>

<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <p id="confirmMessage">Are you sure?</p>
        <div class="confirm-actions">
            <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
            <button class="clear-btn" style="margin:0;" id="confirmOkBtn">Confirm</button>
        </div>
    </div>
</div>

<div id="loginContainer" class="login-container">
    <h2>Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Admin Password">
    <button onclick="checkPassword()">Login</button>
    <div id="loginError" class="error"></div>
</div>

<div class="container" id="mainContainer" style="display:none;">
    <div class="top-bar">
        <h2>Mina Store</h2>
        <div class="top-bar-actions">
            <button class="icon-btn" id="themeToggle">🌙</button>
            <button class="icon-btn logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('retail')">Retail</button>
        <button class="tab-btn" onclick="switchTab('wholesale')">Wholesale</button>
    </div>

    <div id="retailTab">
        <input type="text" id="codeInput" maxlength="5" placeholder="Enter Code (A-J only)">
        <p class="enter-hint">Press Enter to calculate</p>
        <button onclick="calculatePrice()">Calculate</button>
        <div id="result"></div>
    </div>

    <div id="wholesaleTab" style="display:none;">
        <input type="text" id="wholesaleInput" maxlength="5" placeholder="Enter Code (A-J only)">
        <p class="enter-hint">Press Enter to calculate</p>
        <button onclick="calculateWholesale()">Calculate Wholesale</button>
        <div id="wholesaleResult"></div>
    </div>

    <!-- History -->
    <div class="history-section">
        <div class="history-header">
            <h3>History</h3>
            <span class="counter-badge" id="counterBadge">0 today</span>
        </div>

        <div id="retailHistoryWrapper">
            <div class="history-box" id="retailHistory"></div>
            <div class="history-meta">
                <span class="item-count" id="retailItemCount">0 items</span>
            </div>
            <div class="history-totals" id="retailTotals" style="display:none;">
                <div class="total-label">Totals</div>
                <span class="hi-mp">Total MP: <span id="totalRetailMP">0</span></span> &nbsp;
                <span class="hi-cp">Total CP: <span id="totalRetailCP">0</span></span>
            </div>
        </div>

        <div id="wholesaleHistoryWrapper" style="display:none;">
            <div class="history-box" id="wholesaleHistory"></div>
            <div class="history-meta">
                <span class="item-count" id="wholesaleItemCount">0 items</span>
            </div>
            <div class="history-totals" id="wholesaleTotals" style="display:none;">
                <div class="total-label">Totals</div>
                <span class="hi-mp">Total MP: <span id="totalWholesaleMP">0</span></span> &nbsp;
                <span class="hi-cp">Total CP: <span id="totalWholesaleCP">0</span></span> &nbsp;
                <span class="hi-wp">Total WP: <span id="totalWholesaleWP">0</span></span>
            </div>
        </div>

        <button class="clear-btn" onclick="confirmClearHistory()">Clear History</button>
    </div>

    <!-- Sales Section -->
    <div class="sales-section">
        <div class="sales-header">
            <h3>Sales</h3>
            <button class="clear-btn" style="width:auto;margin:0;padding:6px 12px;font-size:12px;" onclick="confirmClearSales()">Clear Sales</button>
        </div>

        <div class="customer-cart">
            <div class="cart-header">
                <span class="cart-title">New Sale</span>
                <button onclick="clearCart()" style="width:auto;margin:0;padding:4px 10px;font-size:11px;background:var(--history-bg);color:var(--text);border:1px solid var(--input-border);">Clear Cart</button>
            </div>

            <div class="cart-customer-row">
                <input type="text" id="customerName" placeholder="Customer name (optional)">
            </div>

            <div class="cart-input-row">
                <input type="text" class="inp-code" id="cartCode" maxlength="5" placeholder="Code">
                <input type="number" class="inp-sp" id="cartSP" placeholder="SP">
                <input type="number" class="inp-qty" id="cartQty" placeholder="Qty" min="1" value="1">
                <button class="cart-add-btn" onclick="addToCart()">+ Add</button>
            </div>
            <div class="cart-decoded" id="cartDecoded"></div>

            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
            <button class="cart-save-btn" onclick="saveSale()">Save Sale</button>
        </div>

        <div class="sales-box" id="salesBox"></div>

        <div class="sales-meta">
            <span class="sales-count" id="salesCount">0 sales</span>
        </div>

        <div id="salesSummary"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
